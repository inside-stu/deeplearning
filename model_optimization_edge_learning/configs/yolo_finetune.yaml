# Example Ultralytics training settings.
# Use this as a reference when filling command-line args or YOLO cfg.

model: yolo11n.pt
data: configs/dataset.yaml
epochs: 50
imgsz: 640
batch: 16
device: 0
workers: 4
patience: 20
optimizer: auto
lr0: 0.01
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3
close_mosaic: 10
freeze: 0
project: runs/detect
name: finetune
